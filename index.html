<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Confeitaria - Gestão de Pedidos</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

    <div class="container">
        <h1>🍰 Confeitaria Dashboard</h1>

        <div id="painel-financeiro">
            <h3>Faturamento Total</h3>
            <p class="valor-grande">
                R$ <span id="faturamento-valor">0,00</span>
            </p>
            <small id="qtd-pedidos">0 pedidos realizados</small>
        </div>

        <div class="formulario-pedido">
            <h3>Novo Pedido</h3>
            <input type="text" id="nome-cliente" placeholder="Nome do Cliente">
            
            <div class="secao-item">
                <input type="text" id="item-nome" placeholder="Produto (ex: Bolo de Brigadeiro)">
                <input type="number" id="item-qtd" placeholder="Qtd" value="1">
                <input type="number" id="item-preco" placeholder="Preço Unitário">
                <button id="btn-add-item" class="btn-secundario">Adicionar Item ➕</button>
            </div>

            <ul id="lista-itens-temporaria"></ul>

            <button id="btn-finalizar-pedido" class="btn-add">Finalizar Pedido ✅</button>
        </div>

        <hr>

        <h3>Pedidos Ativos</h3>
        <div id="container-pedidos">
            </div>
        
        <button id="btn-limpar-tudo" class="btn-danger" style="margin-top: 20px; width: 100%;">Limpar Histórico 🗑️</button>
    </div>

    <script src="./js/script.js"></script>
</body>
</html>
